name: simhammer

services:
  backend:
    build:
      context: backend
      dockerfile: server/Dockerfile
      args:
        - SIMC_VERSION=${SIMC_VERSION:-HEAD}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - simhammer-db:/app/db
    environment:
      - DATA_DIR=/app/resources/data
      - DATABASE_URL=/app/db/simhammer.db

  frontend:
    build:
      context: frontend
      args:
        - NEXT_PUBLIC_API_URL=http://${SERVER_IP:-localhost}:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  resources:
    profiles: ["desktop"]
    build:
      context: desktop
      dockerfile: Dockerfile.resources
      args:
        - SIMC_VERSION=${SIMC_VERSION:-HEAD}
    volumes:
      - ./backend/resources/data:/mount/data
      - ./backend/resources/simc:/mount/simc
    entrypoint: ["sh", "-c", "cp -r /out/data/* /mount/data/ && cp -r /out/simc/* /mount/simc/ && echo 'Resources ready.'"]


volumes:
  simhammer-db:
